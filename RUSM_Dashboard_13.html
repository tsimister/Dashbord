<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B3A5C;--blue:#2E75B6;--teal:#66C6C1;--mTeal:#9EDDD1;--lTeal:#CAEADF;--yel:#FFE885;--lYel:#FFF4C7;--gold:#FEB522;--peri:#98ACE5;--lBl:#B6CDEF;--coral:#F28D79;--pink:#EFB1D0;--gray:#C2C3C8;--dk:#404040;--bg:#F7F6F3;--card:#FFF;--bdr:#E2DED8;--mut:#888780;--cyan:#96EBF6;--r:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dk);padding:1.2rem}
.w{max-width:1200px;margin:0 auto}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-wrap:wrap;gap:6px}
.hd h1{font-size:1.3rem;font-weight:700;color:var(--navy)}

.b{padding:5px 12px;border-radius:16px;border:none;font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit}
.bn{background:var(--navy);color:#fff}.bn:hover{background:#2a5a8c}
.bo{background:#fff;color:var(--navy);border:1.5px solid var(--bdr)}
/* Tabs */
.st{display:flex;gap:.3rem;margin-bottom:.5rem}
.sb{padding:.3rem .8rem;border-radius:16px;border:1.5px solid var(--bdr);background:#fff;font-size:.7rem;cursor:pointer;color:var(--mut);font-weight:500;font-family:inherit}
.sb.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tabs{display:flex;gap:.3rem;margin-bottom:.7rem;flex-wrap:wrap}
.tab{padding:.35rem .8rem;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-size:.72rem;cursor:pointer;color:var(--mut);font-weight:500;font-family:inherit}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab:hover:not(.on){background:#eee}
/* Metrics */
.ms{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:.4rem;margin-bottom:.7rem}
.m{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:.4rem .5rem;text-align:center}
.mv{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:600;color:var(--navy)}
.ml{font-size:.58rem;color:var(--mut)}

.ly{display:grid;grid-template-columns:120px 1fr;gap:1rem;align-items:start}
.bw{position:sticky;top:.7rem}
.blb{font-size:.58rem;font-family:'DM Mono',monospace;color:var(--mut);text-align:center;margin-bottom:.2rem;text-transform:uppercase}

.bsk{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column-reverse}
.bs{width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}

.btg{position:absolute;left:-6px;right:-6px;border-top:2.5px dashed var(--navy);pointer-events:none}
.btl{position:absolute;left:-6px;transform:translateX(-100%);font-size:.55rem;font-family:'DM Mono',monospace;color:var(--navy);font-weight:600;white-space:nowrap;top:-8px;padding-right:3px}
.bsub{font-size:.6rem;font-family:'DM Mono',monospace;color:var(--mut);text-align:center;margin-top:.25rem}
.bgsf{font-size:.68rem;font-family:'DM Mono',monospace;color:var(--navy);text-align:center;font-weight:500}
.bntg{font-size:.55rem;font-family:'DM Mono',monospace;color:var(--blue);text-align:center}

.pt{width:100%;border-collapse:collapse;font-size:.68rem;background:#fff;border-radius:var(--r);overflow:hidden}
.pt th{background:var(--navy);color:#fff;padding:5px 6px;font-weight:600;text-align:right;font-size:.63rem;white-space:nowrap}
.pt th:nth-child(1),.pt th:nth-child(2){text-align:left}
.pt td{padding:4px 6px;border-bottom:1px solid var(--bdr);text-align:right;font-family:'DM Mono',monospace;font-size:.65rem}
.pt td:nth-child(1),.pt td:nth-child(2){text-align:left;font-family:'DM Sans',sans-serif}
.pt tr.c{cursor:pointer}.pt tr.c:hover{filter:brightness(.95)}
.pt tr.c td{font-weight:700;font-size:.7rem;border-bottom:2px solid rgba(0,0,0,.1)}
.pt tr.r td{font-size:.63rem;color:#555}
.pt tr.r.h{display:none}
.pt tr.t td{font-weight:700;background:#1B3A5C;color:#fff;font-size:.7rem}
.pt input[type=number]{width:46px;border:1px solid var(--bdr);border-radius:3px;padding:2px;font-family:'DM Mono',monospace;font-size:.63rem;text-align:right;color:var(--navy)}
.pt input:focus{outline:2px solid var(--blue)}
.pt .d{background:none;border:none;color:var(--coral);cursor:pointer;font-size:.63rem;padding:0 2px}
.ex{display:inline-block;width:0;height:0;border-style:solid;vertical-align:middle}
.ex-r{border-width:4px 0 4px 7px;border-color:transparent transparent transparent var(--navy)}
.ex-d{border-width:7px 4px 0 4px;border-color:var(--navy) transparent transparent transparent}
.af{display:flex;gap:4px;align-items:center;margin-top:4px;padding:4px;background:var(--bg);border-radius:5px;font-size:.65rem;flex-wrap:wrap}
.af input,.af select{border:1px solid var(--bdr);border-radius:3px;padding:2px 3px;font-family:'DM Mono',monospace;font-size:.63rem}
.af select{font-family:'DM Sans',sans-serif}
/* Charts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.cx{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:10px}
.ct{font-size:.78rem;font-weight:700;color:var(--navy);margin-bottom:6px}
.cs{font-size:.58rem;color:var(--mut);margin-top:3px}

.kt{width:100%;border-collapse:collapse;font-size:.68rem;background:#fff;border-radius:var(--r);overflow:hidden;margin-top:8px}
.kt th{background:var(--navy);color:#fff;padding:5px 6px;font-weight:600;text-align:right}
.kt th:first-child{text-align:left}
.kt td{padding:5px 6px;border-bottom:1px solid var(--bdr);text-align:right;font-family:'DM Mono',monospace}
.kt td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500}
.kt tr:nth-child(even){background:var(--bg)}
.kt tr.a td{color:var(--navy);font-weight:700;background:#1B3A5C10}

.sc{display:flex;gap:5px;align-items:center;font-size:.68rem;margin-bottom:6px}
.sc select{border:1px solid var(--bdr);border-radius:3px;padding:2px;font-size:.68rem}
